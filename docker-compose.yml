version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pcestore-db
    environment:
      POSTGRES_DB: pcestore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pcestore-network

  redis:
    image: redis:7-alpine
    container_name: pcestore-redis
    ports:
      - "6379:6379"
    networks:
      - pcestore-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: pcestore-rabbitmq
    ports:
      - "5672:5672"       # AMQP port
      - "15672:15672"     # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - pcestore-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/pcestore
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      AWS_LAMBDA_QR_URL: "" # Cấu hình URL AWS Lambda khi deploy thực tế (để trống sẽ tự động fallback sinh QR local)
    depends_on:
      - db
      - redis
      - rabbitmq
    deploy:
      replicas: 2 # Scale 2 instances backend
    networks:
      - pcestore-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BACKEND_URI: http://backend:8080 # Docker DNS sẽ tự động Load Balance sang 2 instances backend
    depends_on:
      - redis
      - backend
    networks:
      - pcestore-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    networks:
      - pcestore-network

  nginx:
    image: nginx:alpine
    container_name: pcestore-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
      - frontend
    networks:
      - pcestore-network

volumes:
  postgres_data:

networks:
  pcestore-network:
    driver: bridge
