version: "3.8"

services:
  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins/Dockerfile

    container_name: pcestore-jenkins
    privileged: true
    user: root

    ports:
      - "8082:8080"
      - "50000:50000"

    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ubuntu/DTDM:/workspace

    working_dir: /workspace

    restart: always

volumes:
  jenkins_data:
